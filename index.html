<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Simulador de Desconto de Energia</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: #f4f4f9;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
}

.top-image {
  width: 100%;
  max-width: 400px;
  height: 150px;
  background: url("LOGO-03.png") no-repeat center center;
  background-size: contain;
  margin: 20px auto;
}

.container {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 420px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input {
  width: 100%;
  padding: 7px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 16px;
}

button {
  background: #28a745;
  color: #fff;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  background: #f9f9f9;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.erro {
  color: red;
  font-weight: bold;
  margin-top: 10px;
  text-align: center;
}

.aviso-atencao {
  background-color: #fff3cd;
  border-left: 5px solid #ffa500;
  padding: 12px;
  margin-top: 15px;
  color: #664d03;
}

#btnWhatsApp {
  background-color: #25D366;
  margin-top: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="top-image"></div>

<div class="container">
<h2>Simule seu Desconto</h2>

<label>Iluminação Pública (R$):</label>
<input type="number" id="iluminacao" min="0" step="0.01">

<label>Consumo Mensal (kWh):</label>
<input type="number" id="consumo" min="0" step="0.01">

<label>Tarifa TE (R$/kWh):</label>
<input type="number" id="tarifaTE" min="0" step="0.00001">

<label>Tarifa TUSD (R$/kWh):</label>
<input type="number" id="tarifaTUSD" min="0" step="0.00001">

<label>Adicional de Bandeira (R$/kWh):</label>
<input type="number" id="adcBandeira" min="0" step="0.00001">

<label>Desconto Manual (%) - Opcional:</label>
<input type="number" id="descontoManual" min="0" max="100" step="0.01">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
<div class="erro" id="erro"></div>

<button id="btnWhatsApp" onclick="enviarWhatsApp()">📲 Enviar resultado pelo WhatsApp</button>
</div>

<script>

let valorTotal = 0;

function calcular() {

const iluminacao = parseFloat(document.getElementById('iluminacao').value) || 0;
const consumo = parseFloat(document.getElementById('consumo').value) || 0;
const tarifaTE = parseFloat(document.getElementById('tarifaTE').value) || 0;
const tarifaTUSD = parseFloat(document.getElementById('tarifaTUSD').value) || 0;
const adcBandeira = parseFloat(document.getElementById('adcBandeira').value) || 0;
const descontoManualInput = parseFloat(document.getElementById('descontoManual').value);

if (consumo <= 0 || tarifaTE <= 0 || tarifaTUSD <= 0) {
  document.getElementById('erro').textContent =
    "⚠️ Preencha todos os campos corretamente.";
  return;
}

document.getElementById('erro').textContent = "";

/* ===============================
   ✅ LÓGICA IGUAL EXCEL
=================================*/

// 🔹 Energia compensável (BASE DO DESCONTO)
const baseDesconto = consumo * (tarifaTE + tarifaTUSD);

// 🔹 Energia total (inclui bandeira)
const valorEnergiaTotal = baseDesconto + (consumo * adcBandeira);

// 🔹 Valor total da fatura
valorTotal = valorEnergiaTotal + iluminacao;

/* ===============================
   DESCONTO
=================================*/

let desconto = 0;

if (!isNaN(descontoManualInput) && descontoManualInput > 0 && descontoManualInput <= 100) {
  desconto = descontoManualInput / 100;
} else {
  if (valorTotal >= 300 && valorTotal < 1000) desconto = 0.15;
  else if (valorTotal >= 1000 && valorTotal < 2000) desconto = 0.20;
  else if (valorTotal >= 2000) desconto = 0.25;
}

// ✅ desconto aplicado somente na energia compensável
const descontoMensal = baseDesconto * desconto;
const descontoAnual = descontoMensal * 12;
const valorComDesconto = valorTotal - descontoMensal;

/* ===============================
   RESULTADO
=================================*/

const formatar = v =>
  v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

document.getElementById('resultado').innerHTML = `
<p><strong>Valor estimado da fatura:</strong> ${formatar(valorTotal)}</p>
<p style="text-align:center;"><strong style="color:green;">FATURA SUNBOLT FLEX</strong></p>
<p><strong>Valor da fatura com desconto:</strong> ${formatar(valorComDesconto)}</p>
<p><strong>Desconto mensal previsto:</strong> ${formatar(descontoMensal)}</p>
<p><strong>Desconto anual previsto:</strong> ${formatar(descontoAnual)}</p>

<div class="aviso-atencao">
⚠️ Esta é uma simulação. Os valores podem variar conforme consumo,
bandeiras tarifárias e condições contratuais.
</div>
`;

if (valorTotal >= 300) {
  document.getElementById('btnWhatsApp').style.display = 'block';
}

}

/* ===============================
WHATSAPP
=================================*/

function enviarWhatsApp() {
const texto = document.getElementById('resultado').innerText;
const telefone = "5585999416424";
const msg = encodeURIComponent("Resultado do simulador:\n\n" + texto);
window.open(`https://wa.me/${telefone}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
