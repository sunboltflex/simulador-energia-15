<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Simulador de Desconto | Sunbolt Flex</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #0b1220;
      --card: rgba(255,255,255,.08);
      --card2: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --muted2: rgba(255,255,255,.55);
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius: 18px;
      --brand: #19c37d;
      --danger:#ff5a5f;
      --warnbg: rgba(255, 193, 7, .14);
      --warnbd: rgba(255, 193, 7, .35);
      --warntext: #ffd36a;
      --okbg: rgba(25, 195, 125, .12);
      --okbd: rgba(25, 195, 125, .30);
    }

    *{ box-sizing: border-box; }

    html, body{
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 20% 10%, rgba(25,195,125,.25), transparent 55%),
        radial-gradient(900px 420px at 85% 30%, rgba(0,212,255,.18), transparent 55%),
        radial-gradient(700px 380px at 55% 95%, rgba(25,195,125,.10), transparent 55%),
        var(--bg);
    }

    .page{
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 22px 12px;
    }

    .wrap{
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 18px;
      align-items: stretch;
    }

    .brandbar{
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      opacity: .98;
    }

    .brandbar .logo{
      width: 190px;
      height: 58px;
      background: url("LOGO-03.png") no-repeat center center;
      background-size: contain;
      filter: drop-shadow(0 8px 22px rgba(0,0,0,.35));
    }

    .card{
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 18px;
      overflow: hidden;
      position: relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(120deg, rgba(25,195,125,.22), transparent 35%),
        linear-gradient(240deg, rgba(0,212,255,.14), transparent 40%);
      pointer-events:none;
      opacity:.55;
    }
    .card > *{ position: relative; z-index: 1; }

    .result-logo{
      width:160px;
      height:50px;
      margin: 0 auto 12px auto;
      background:url("LOGO-03.png") no-repeat center center;
      background-size:contain;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,.35));
    }

    .title{
      display:flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .title h1{
      font-size: 20px;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .title p{
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field{
      display:flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label{
      font-size: 12.5px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .01em;
    }

    .control input{
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10, 16, 30, .45);
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      outline: none;
    }

    .hint{
      grid-column: 1 / -1;
      margin-top: 2px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--muted2);
      font-size: 12.5px;
    }

    .actions{
      grid-column: 1 / -1;
      display:flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn{
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary{
      color: #062113;
      background: linear-gradient(90deg, var(--brand), #52e3b0);
    }

    .btn-wa{
      display:none;
      background: linear-gradient(90deg, #25D366, #5ef09a);
      color: #062113;
      margin-top: 12px;
    }

    .resultbox{
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .kpis{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .kpi{
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }

    .kpi .label{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .kpi .value{
      font-size: 16px;
      font-weight: 900;
    }

    .highlight{
      border: 1px solid var(--okbd);
      background: var(--okbg);
    }

    .aviso{
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--warnbd);
      background: var(--warnbg);
      color: var(--warntext);
      font-size: 12.5px;
    }

    @media (max-width: 900px){
      .wrap{ grid-template-columns: 1fr; max-width: 520px; }
    }
    @media (max-width: 460px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="wrap">

      <div class="brandbar">
        <div class="logo"></div>
      </div>

      <!-- FORM -->
      <div class="card">
        <div class="title">
          <h1>Simule seu desconto</h1>
          <p>Preencha os dados da fatura e veja uma estimativa de economia mensal e anual.</p>
        </div>

        <div class="grid">
          <div class="field">
            <label>Iluminação Pública (R$)</label>
            <div class="control">
              <input type="number" id="iluminacao">
            </div>
          </div>

          <div class="field">
            <label>Consumo Mensal (kWh)</label>
            <div class="control">
              <input type="number" id="consumo">
            </div>
          </div>

          <div class="field">
            <label>Tarifa TE (R$/kWh)</label>
            <div class="control">
              <input type="number" id="tarifaTE">
            </div>
          </div>

          <div class="field">
            <label>Tarifa TUSD (R$/kWh)</label>
            <div class="control">
              <input type="number" id="tarifaTUSD">
            </div>
          </div>

          <div class="field">
            <label>Adicional Bandeira (R$/kWh)</label>
            <div class="control">
              <input type="number" id="adcBandeira">
            </div>
          </div>

          <div class="field">
            <label>Desconto Manual (%)</label>
            <div class="control">
              <input type="number" id="descontoManual">
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" onclick="calcular()">⚡ Calcular</button>
          </div>
        </div>
      </div>

      <!-- RESULTADO -->
      <div class="card resultbox">

        <!-- LOGO DENTRO DO RESULTADO -->
        <div class="result-logo"></div>

        <div class="title">
          <h1>Resultado</h1>
          <p>Você verá aqui a estimativa após calcular.</p>
        </div>

        <div id="resultado"></div>

        <button class="btn btn-wa" id="btnWhatsApp" onclick="enviarWhatsApp()">📲 Enviar pelo WhatsApp</button>
      </div>

    </div>
  </div>

  <script>
    // 🔒 TODA SUA LÓGICA ORIGINAL PERMANECE IGUAL
  </script>

</body>
</html>
